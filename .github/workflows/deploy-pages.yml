name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
      
      - name: Verify dist folder
        run: |
          echo "Dist folder contents:"
          ls -la dist/
          echo "=== Checking for source files ==="
          if find dist -name "*.jsx" -o -name "*.tsx" -o -name "*.ts" | grep -v node_modules; then
            echo "❌ ERROR: Source files found in dist!"
            echo "Build is broken. Check vite.config.js"
            exit 1
          else
            echo "✅ No source files in dist - Build is correct!"
          fi
          echo "=== Built index.html preview ==="
          head -20 dist/index.html
          echo ""
          echo "✅ Build verification passed!"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
